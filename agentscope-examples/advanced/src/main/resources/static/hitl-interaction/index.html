<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HITL Interactive UI - AgentScope</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="header-title">
                    <h1>HITL Interactive UI</h1>
                    <p id="subtitle">Agent with Dynamic UI-based User Interaction</p>
                </div>
                <div class="header-actions">
                    <button id="clear-btn" class="btn btn-ghost" title="Clear session">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                    <div class="lang-switch">
                        <button id="lang-en" class="lang-btn active">EN</button>
                        <button id="lang-zh" class="lang-btn">中文</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="chat-area">
            <div id="chat-messages" class="chat-messages">
                <div class="welcome-message">
                    <div class="welcome-icon">🤖</div>
                    <h2 id="welcome-title">Welcome!</h2>
                    <p id="welcome-desc">I'm your personal fitness coach. Tell me your goals, and I'll create a customized workout plan through interactive forms.</p>
                    <div class="example-queries">
                        <button class="example-btn" onclick="sendExample(this)">帮我制定一个健身计划</button>
                        <button class="example-btn" onclick="sendExample(this)">I want to lose weight</button>
                        <button class="example-btn" onclick="sendExample(this)">我想增肌，每周能练4天</button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
                    <div class="input-buttons">
                        <button id="send-btn" class="btn btn-primary">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                        <button id="stop-btn" class="btn btn-warning hidden">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="6" y="6" width="12" height="12" rx="2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
