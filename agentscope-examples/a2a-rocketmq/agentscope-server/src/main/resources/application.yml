# A2A Protocol Example Application Server Configuration for RocketMQ Transport
server:
  port: 8080
# Spring application settings
spring:
  application:
    name: agentscope-demo
# AgentScope configuration
agentscope:
  # LLM provider API configuration
  dashscope:
    api-key: ${apiKey:}  # DashScope API key for model access
  # Agent identity settings
  agent:
    name: my-assistant
    modelName: qwen-plus
  # A2A (Agent-to-Agent) protocol configuration
  a2a:
    server:
      enabled: true
      card:
        name: My Assistant
        description: An intelligent assistant based on AgentScope
      transports:
        # RocketMQ transport for asynchronous message communication
        rocketmq:
          enabled: true
          rocketMQEndpoint: ${rocketMQEndpoint:}              # RocketMQ Server endpoint
          rocketMQNamespace: ${rocketMQNamespace:}            # RocketMQ namespace isolation
          biz-topic: ${bizTopic:LLM_TOPIC}                                 # Business message topic name
          biz-consumer-group: ${bizConsumerGroup:LLM_CID}                         # Consumer group for business messages
          workAgentResponseTopic: ${workAgentResponseTopic:WorkerAgentResponseServer}          # Topic for receiving sticky agent requests (lightweight topic)
          workAgentResponseGroupId: ${workAgentResponseGroupId:CID_HOST_AGENT_LITE_SERVER}  # Consumer group for agent responses
          accessKey: ${rocketMQAK:}                   # Authentication access key
          secret-key: ${rocketMQSK:}                  # Authentication secret key
        # JSON-RPC transport for synchronous HTTP communication
        jsonrpc:
          enabled: true
